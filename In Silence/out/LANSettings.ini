[Server]
; Photon Server Configuration
; This file allows you to customize the Photon server connection settings

; Server address (IP or hostname)
; Example: 127.0.0.1 (local server) or 192.168.1.100 (local network)
ServerAddress = 127.0.0.1

; Server port (default: 5055)
ServerPort = 5055

; Server version (4 or 5; default: 4)
ServerVersion = 4